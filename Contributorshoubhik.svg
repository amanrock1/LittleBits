<svg width="340" height="150" viewBox="0 0 340 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B860"/>
      <stop offset="100%" stop-color="#7C5CFC"/>
    </linearGradient>
    <linearGradient id="avatarGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B860"/>
      <stop offset="100%" stop-color="#7C5CFC"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#F4B860" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#F4B860" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- gradient border frame -->
  <rect x="1" y="1" width="338" height="148" rx="19" fill="url(#borderGrad2)"/>

  <!-- card body -->
  <rect x="3" y="3" width="334" height="144" rx="17" fill="#0F0F14"/>
  <rect x="3" y="3" width="334" height="144" rx="17" fill="url(#glow2)"/>

  <!-- faint corner glyph -->
  <text x="292" y="46" font-family="JetBrains Mono, monospace" font-size="13" fill="#F4B860" opacity="0.4">🎮</text>

  <!-- avatar -->
  <circle cx="50" cy="75" r="30" fill="url(#avatarGrad2)"/>
  <circle cx="50" cy="75" r="30" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="50" y="84" font-family="Space Grotesk, sans-serif" font-size="24" font-weight="700" fill="#0B0B0F" text-anchor="middle">S</text>

  <!-- name + role -->
  <text x="96" y="64" font-family="Space Grotesk, sans-serif" font-size="20" font-weight="700" fill="#ECECF1">Shoubhik</text>
  <text x="96" y="84" font-family="Inter, sans-serif" font-size="12.5" fill="#8C8C99">Contributor · Super Admin</text>

  <!-- handle pill -->
  <rect x="96" y="94" width="128" height="22" rx="11" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
  <text x="106" y="109" font-family="JetBrains Mono, monospace" font-size="11" fill="#F4B860">@Shoubhik95</text>

  <!-- divider -->
  <line x1="24" y1="124" x2="316" y2="124" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- footer line -->
  <text x="24" y="140" font-family="Inter, sans-serif" font-size="11" fill="#5C5C68">Built &amp; maintained for LittleBits — Chapters &amp; Exhibitions Hub</text>

  <!-- small status dot -->
  <circle cx="316" cy="136" r="4" fill="#F4B860"/>
  <circle cx="316" cy="136" r="4" fill="none" stroke="#F4B860" stroke-opacity="0.4" stroke-width="3" filter="url(#soft2)"/>
</svg>
